# ============================================================
# [사이트 기본 설정]
# ============================================================
# baseURL: 배포되는 실제 사이트 주소. GitHub Pages 주소와 반드시 일치해야 합니다.
baseURL = "https://yoonky-kor.github.io/"

# title: 브라우저 탭과 meta 태그에 표시되는 사이트 공식 이름입니다.
#         SEO 및 RSS 피드 제목으로도 사용됩니다.
title = "KY's Blog"

# languageCode: 사이트 언어 코드 (ko = 한국어, en = 영어)
languageCode = "ko"

# theme: 사용할 Hugo 테마 이름. themes/ 폴더의 디렉토리명과 일치해야 합니다.
theme = "PaperMod"


# ============================================================
# [마크다운 및 하이라이팅 설정] - 기술 블로그 최적화
# ============================================================
[markup]
  # highlight: 코드 블록의 시각적 효과를 설정합니다.
  [markup.highlight]
    codeFences = true        # 코드 블록 주위의 구분선 활성화
    guessSyntax = true       # 언어 미지정 시 자동으로 언어 추측
    lineNos = true           # 코드 왼쪽에 줄 번호 표시 (엔지니어링 블로그 권장)
    style = "monokai"        # 다크 모드에 최적화된 하이라이팅 스타일
    noClasses = false

  # goldmark: 마크다운 렌더링 엔진 설정입니다.
  [markup.goldmark.renderer]
    unsafe = true            # HTML 태그 직접 사용 허용 (수식 렌더링 및 커스텀 레이아웃용)


# ============================================================
# [페이지네이션 설정]
# ============================================================
[pagination]
  # pagerSize: 목록 페이지에서 한 번에 표시할 포스트 수
  pagerSize = 5


# ============================================================
# [크롤러 / SEO 설정]
# ============================================================
# enableRobotsTXT: true 시 robots.txt 자동 생성 → 검색엔진 크롤링 허용
enableRobotsTXT = true


# ============================================================
# [출력 포맷 설정]
# ============================================================
[outputs]
  # home: 홈페이지에서 생성할 파일 형식
  #    HTML  → 일반 웹 페이지
  #    RSS   → RSS 구독 피드 (/index.xml)
  #    JSON  → 검색 기능용 인덱스 (/index.json)
  home = ["HTML", "RSS", "JSON"]


# ============================================================
# [PaperMod 테마 파라미터]
# ============================================================
[params]
  # env: 빌드 환경. "production" 시 Google Analytics 등 프로덕션 기능 활성화
  env = "production"

  # title: 사이트 헤더(로고 옆)에 표시되는 이름. baseURL 위의 title과 별개입니다.
  #         → 헤더 표시명만 바꾸고 싶을 때 여기를 수정하세요.
  title = "Tab"

  # description: meta description 태그. 검색 결과 미리보기 텍스트로 사용됩니다.
  description = "Cloud & AI Engineering Blog"

  # author: 포스트 작성자 기본값. 각 포스트 front matter에서 개별 오버라이드 가능합니다.
  author = "Yoon KY"

  # defaultTheme: 기본 컬러 테마 ("auto" = 시스템 설정 따름, "light", "dark")
  defaultTheme = "auto"

  # comments: true 시 모든 포스트에 댓글창 활성화
  # 개별 포스트에서 비활성화하려면 front matter에 comments: false 추가
  comments = true


  # ----------------------------------------------------------
  # [1. 파비콘 설정]
  # ----------------------------------------------------------
  # 브라우저 탭 아이콘 설정. 아래 파일들이 static/ 폴더에 있어야 합니다.
  #    favicon.ico          → 기본 파비콘 (모든 브라우저)
  #    favicon-16x16.png    → 16×16 파비콘
  #    favicon-32x32.png    → 32×32 파비콘
  #    apple-touch-icon.png → iOS 홈 화면 추가 시 표시되는 아이콘 (180×180 권장)
  [params.assets]
    favicon            = "/favicon.ico"
    favicon16x16       = "/favicon-16x16.png"
    favicon32x32       = "/favicon-32x32.png"
    apple_touch_icon   = "/apple-touch-icon.png"


  # ----------------------------------------------------------
  # [2. UI/UX 설정]
  # ----------------------------------------------------------
  # ShowReadingTime: 포스트 상단에 예상 읽기 시간 표시 (true/false)
  ShowReadingTime = true

  # ShowShareButtons: 포스트 하단 SNS 공유 버튼 표시 (true/false)
  ShowShareButtons = true

  # ShowCodeCopyButtons: 코드 블록 우측 상단 복사 버튼 표시 (true/false)
  ShowCodeCopyButtons = true

  # ShowPostNavLinks: 포스트 하단 이전글/다음글 링크 표시 (true/false)
  ShowPostNavLinks = true

  # ShowBreadCrumbs: 페이지 상단 경로(breadcrumb) 표시 (true/false)
  ShowBreadCrumbs = true

  # ShowToc: 포스트 목차(Table of Contents) 표시 (true/false)
  ShowToc = true

  # TocOpen: true 시 목차가 펼쳐진 상태로 표시, false 시 접힌 상태로 표시
  TocOpen = true

  # ShowWordCount: 포스트 상단 단어 수 표시 (true/false)
  ShowWordCount = true

  # disableSpecial1stPost: 첫 번째 포스트를 히어로 카드로 강조하는 기능 비활성화
  #    false = 첫 포스트 강조 활성, true = 비활성
  disableSpecial1stPost = false

  # mainSections: 홈 피드 및 RSS에 포함할 content/ 하위 섹션 목록
  #    → 새 카테고리 폴더를 추가할 경우 여기에도 등록하세요.
  mainSections = ["posts", "azure", "architecture", "ai"]


  # ----------------------------------------------------------
  # [3. 소셜 커버 및 메타 데이터]
  # ----------------------------------------------------------
  # images: 카카오톡/슬랙 등 SNS에 링크 공유 시 미리보기로 표시되는 대표 이미지입니다.
  # Hugo가 이 값을 OpenGraph og:image 메타태그로 자동 처리합니다.
  # 파일 위치: static/papermod-cover.png (권장 크기: 1200×630px)
  images = ["/papermod-cover.png"]

  # math: true 시 LaTeX 수식 렌더링 활성화 (AI/기술 포스팅 시 사용)
  math = true


# ============================================================
# [홈 화면 인트로 설정 — profileMode]
# ============================================================
# PaperMod 홈 화면 모드는 두 가지이며 서로 배타적입니다.
#   profileMode  : 프로필 이미지 + 제목 + 부제목 표시 (현재 사용)
#   homeInfoParams: 제목 + 마크다운 본문 표시 (이미지 미지원)
# 전환 시 profileMode.enabled 를 false, homeInfoParams 섹션을 추가하면 됩니다.

[params.profileMode]
  # enabled: true 시 profileMode 활성화. false 시 homeInfoParams 모드로 전환됩니다.
  enabled = true

  # title: 홈 화면 프로필 영역의 메인 제목
  title = "KY's Engineering Blog"

  # subtitle: 제목 아래 표시되는 한 줄 소개 문구
  subtitle = "클라우드 아키텍처와 AI 기술 학습 노트를 공유합니다."

  # ----------------------------------------------------------
  # [4. 홈 프로필 이미지 설정]
  # ----------------------------------------------------------
  # 파일 위치: static/profile.png  (assets/ 폴더 사용 시 경로에서 /를 제거하세요)
  # imageWidth / imageHeight: 픽셀 단위 표시 크기 (정사각형 권장)
  imageUrl    = "/profile.png"
  imageWidth  = 120
  imageHeight = 120
  imageTitle  = "Yoon KY"


# ============================================================
# [소셜 아이콘 설정]
# ============================================================
# 헤더 또는 홈에 표시되는 소셜 링크입니다.
# name: PaperMod 지원 아이콘명 (github, twitter, linkedin, email, rss 등)
# url: 연결할 주소

[[params.socialIcons]]
  name = "github"
  url  = "https://github.com/YOONKY-KOR"

[[params.socialIcons]]
  name = "email"
  url  = "mailto:rkdduf86@gmail.com"

[[params.socialIcons]]
  name = "linkedin"
  url  = "https://www.linkedin.com/in/yoonky0917"


# ============================================================
# [검색 설정 (Fuse.js)]
# ============================================================
# PaperMod 내장 검색은 Fuse.js를 사용합니다.
[params.fuseOpts]
  # isCaseSensitive: 대소문자 구분 여부 (false = 구분 안 함)
  isCaseSensitive = false

  # shouldSort: 검색 결과를 관련도 순으로 정렬 (true 권장)
  shouldSort = true

  # threshold: 검색 민감도 (0.0 = 완전일치만, 1.0 = 모두 매칭. 0.3~0.5 권장)
  threshold = 0.4

  # keys: 검색 대상 필드 목록
  keys = ["title", "permalink", "summary", "content"]


# ============================================================
# [5. 메뉴 설정]
# ============================================================
# 상단 네비게이션 메뉴를 구성합니다.
# identifier : 메뉴 고유 ID (중복 불가)
# name        : 화면에 표시되는 메뉴 이름
# url         : 클릭 시 이동할 경로 (content/ 폴더 구조와 일치해야 합니다)
# weight      : 숫자가 낮을수록 왼쪽에 배치됩니다
# parent      : 드롭다운 하위 메뉴일 경우 부모 identifier 지정

[[menu.main]]
  identifier = "about"
  name        = "About"
  url         = "/about/"
  weight      = 10

[[menu.main]]
  identifier = "blog"
  name        = "Blog"
  url         = "/posts/"
  weight      = 20

# Categories 드롭다운 부모 메뉴 (url 없음 → 클릭 시 하위 메뉴 펼침)
[[menu.main]]
  identifier = "categories"
  name        = "Categories"
  weight      = 30

# Categories 하위 메뉴 (parent = "categories" 로 드롭다운에 포함)
[[menu.main]]
  parent      = "categories"
  identifier = "ai"
  name        = "AI"
  url         = "/ai/"
  weight      = 1

[[menu.main]]
  parent      = "categories"
  identifier = "architecture"
  name        = "Architecture"
  url         = "/architecture/"
  weight      = 2

[[menu.main]]
  parent      = "categories"
  identifier = "azure"
  name        = "Azure"
  url         = "/azure/"
  weight      = 3

[[menu.main]]
  identifier = "search"
  name        = "Search"
  url         = "/search/"
  weight      = 40

[[menu.main]]
  identifier = "archives"
  name        = "Archives"
  url         = "/archives/"
  weight      = 50


# ============================================================
# [6. 택소노미(분류) 설정]
# ============================================================
# 포스트 front matter에서 사용할 분류 체계를 정의합니다.
# 형식: 단수형_키 = "복수형_URL경로"
#    category → /categories/ 페이지 생성
#    tag      → /tags/ 페이지 생성
#    series   → /series/ 페이지 생성 (연재글 묶음)
[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"


# ============================================================
# [7. Giscus 댓글 설정]
# ============================================================
# GitHub Discussions 기반 댓글 시스템입니다.
# 설정 전 아래 단계를 먼저 완료하세요:
#   1. https://github.com/apps/giscus 에서 저장소에 Giscus 앱 설치
#   2. 저장소 Settings > General > Discussions 활성화
#   3. https://giscus.app 에서 설정 후 repo-id, category-id 값 복사
#
# ⚠️  repoId / categoryId 는 giscus.app 에서 발급받은 값으로 교체하세요.
[params.giscus]
  # repo: "GitHub사용자명/저장소명" 형식
  repo           = "YOONKY-KOR/yoonky-kor.github.io"

  # repoId: giscus.app 에서 확인한 Repository ID (R_ 로 시작)
  repoId         = "R_kgDOSCJouw"

  # category: Discussions 카테고리 이름 (보통 "General" 또는 "Announcements")
  # categoryId: giscus.app 에서 확인한 Category ID (DIC_ 로 시작)
  categoryId     = "DIC_kwDOSCJou84C7Qo_"

  # mapping: 포스트와 Discussion을 연결하는 방식
  #   "pathname" = URL 경로 기준 (권장), "title" = 포스트 제목 기준
  mapping        = "pathname"

  # reactionsEnabled: 포스트 상단 이모지 반응 버튼 표시 ("1" = 활성, "0" = 비활성)
  reactionsEnabled = "1"

  # inputPosition: 댓글 입력창 위치 ("bottom" = 댓글 아래, "top" = 댓글 위)
  inputPosition  = "bottom"

  # theme: 댓글창 테마 ("preferred_color_scheme" = 시스템 다크/라이트 자동 적용)
  theme          = "preferred_color_scheme"

  # lang: 댓글창 언어 ("ko" = 한국어)
  lang           = "ko"
