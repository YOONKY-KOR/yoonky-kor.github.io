baseURL = "https://yoonky-kor.github.io/"
title = "KY's Blog"
languageCode = "ko"
theme = "PaperMod"

[pagination]
  pagerSize = 5

enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Tab"
  description = "Cloud & AI Engineering Blog"
  author = "yoonkyl"
  defaultTheme = "auto"

  # --- [1. 파비콘 설정] ---
  # static/ 폴더에 해당 파일들이 있어야 브라우저 탭에 아이콘이 나타납니다.
  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"

  # --- [2. UI/UX 설정] ---
  ShowReadingTime = true
  ShowShareButtons = true      # 포스트 하단 공유 버튼
  ShowCodeCopyButtons = true   # 코드 블록 복사 버튼
  ShowPostNavLinks = true      # 이전/다음 글 링크
  ShowBreadCrumbs = true       # 페이지 경로 표시
  ShowToc = true               # 목차 표시
  ShowWordCount = true         # 단어 수 표시
  disableSpecial1stPost = false
  mainSections = ["posts", "azure", "architecture", "ai"]

  # --- [3. 소셜 커버 이미지] ---
  # 블로그 링크 공유 시 나타날 기본 이미지 (static/papermod-cover.png)
  images = ["/papermod-cover.png"]

[params.homeInfoParams]
  Title = "KY's Engineering Blog"
  Content = "클라우드 아키텍처와 AI 기술 학습 노트를 공유합니다."
  
  # --- [4. 홈 프로필 이미지 설정] ---
  # static/profile.png 경로의 파일을 첫 화면에 표시합니다.
  imageUrl = "/profile.png"
  imageWidth = 120
  imageHeight = 120

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/YOONKY-KOR"

[[params.socialIcons]]
  name = "email"
  url = "mailto:yoonky1757@gmail.com"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4
  keys = ["title", "permalink", "summary", "content"]

# --- [5. 메뉴 설정] ---
[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  weight = 30

[[menu.main]]
  parent = "categories"
  identifier = "ai"
  name = "AI"
  url = "/ai/"
  weight = 1

[[menu.main]]
  parent = "categories"
  identifier = "architecture"
  name = "Architecture"
  url = "/architecture/"
  weight = 2

[[menu.main]]
  parent = "categories"
  identifier = "azure"
  name = "Azure"
  url = "/azure/"
  weight = 3

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 50

# --- [6. 택소노미(분류) 설정] ---
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"