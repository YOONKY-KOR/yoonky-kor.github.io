baseURL = "https://yoonky-kor.github.io/"
title = "KY"
languageCode = "ko"
theme = "PaperMod"

[pagination]
  pagerSize = 5

enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "KY"
  description = "Cloud & AI Engineering Blog"
  author = "KY"
  defaultTheme = "auto"
  
  
  # UI/UX
  ShowReadingTime = true
  ShowShareButtons = true      # 공유 버튼 활성화 추천
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  ShowWordCount = true
  disableSpecial1stPost = false
  mainSections = ["posts", "azure", "architecture", "ai"]

[params.homeInfoParams]
  Title = "KY's Engineering Blog"
  Content = "클라우드 아키텍처와 AI 기술 학습 노트를 공유합니다."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/YOONKY-KOR"

[[params.socialIcons]]
  name = "email"
  url = "mailto:yoonky1757@gmail.com"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4
  keys = ["title", "permalink", "summary", "content"]

# 메뉴 설정 (기존과 동일)
[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

