baseURL = "https://yoonky-kor.github.io/"
title = "My Engineering Blog"
languageCode = "ko"
theme = "PaperMod"
[pagination]
  pagerSize = 5
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  defaultTheme = "auto"
  env = "production"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  disableSpecial1stPost = false
  mainSections = ["posts", "azure", "architecture", "ai"]

[params.homeInfoParams]
  Title = "KY's Engineering Blog"
  Content = "기술 학습 노트와 프로젝트 회고를 공유합니다."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/YOONKY-KOR"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4
  keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/posts/"
  weight = 20

